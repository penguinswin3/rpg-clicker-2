<div class="log-panel" [class.minimized]="minimized">

  <div class="log-header" (click)="toggle()">
    <span class="log-title">[ ACTIVITY LOG ]</span>
    <span class="log-toggle">{{ minimized ? '[+]' : '[-]' }}</span>
  </div>

  <ng-container *ngIf="!minimized">
    <!-- Filter bar -->
    <div class="filter-bar" (click)="$event.stopPropagation()">
      <button
        class="filter-btn"
        [class.active]="allActive"
        data-type="all"
        (click)="toggleAllFilters()">
        ALL
      </button>
      <span class="filter-sep">|</span>
      <button
        class="filter-btn"
        *ngFor="let f of filters"
        [class.active]="activeFilters.has(f.value)"
        [attr.data-type]="f.value"
        (click)="toggleFilter(f.value)">
        {{ f.label }}
      </button>
    </div>

    <!-- Log body -->
    <div class="log-body" #logBody>
      <div *ngIf="filteredMessages.length === 0" class="log-empty">
        -- No {{ allActive ? 'activity' : 'matching' }} entries --
      </div>
      <div
        class="log-entry"
        *ngFor="let msg of filteredMessages; trackBy: trackById"
        [ngClass]="'type-' + (msg.type ?? 'default')">
        <span class="log-time">[{{ msg.timestamp }}]</span>
        <span class="log-text">> <ng-container *ngFor="let seg of parseLogText(msg)"><span *ngIf="seg.color; else plainSeg" [style.color]="seg.color">{{ seg.text }}</span><ng-template #plainSeg>{{ seg.text }}</ng-template></ng-container></span>
      </div>
    </div>
  </ng-container>

</div>
